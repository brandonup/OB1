<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Brain — How It Works</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .chart-container {
      width: 100%;
      max-width: 1200px;
      overflow-x: auto;
    }
    svg {
      display: block;
      margin: 0 auto;
    }
    /* Node styles */
    .layer-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      fill: #94a3b8;
    }
    .layer-num {
      font-size: 11px;
      font-weight: 600;
      fill: #64748b;
    }
    .node-text {
      font-size: 13px;
      font-weight: 600;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .node-text-sm {
      font-size: 10.5px;
      font-weight: 500;
      fill: rgba(255,255,255,0.85);
      text-anchor: middle;
      dominant-baseline: central;
    }
    .node-text-dark {
      font-size: 13px;
      font-weight: 600;
      fill: #1e293b;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .node-text-dark-sm {
      font-size: 10.5px;
      font-weight: 500;
      fill: rgba(30,41,59,0.8);
      text-anchor: middle;
      dominant-baseline: central;
    }
    .arrow-label {
      font-size: 10px;
      font-weight: 500;
      fill: #94a3b8;
      text-anchor: middle;
    }
    .section-bg {
      rx: 12;
      ry: 12;
    }
    .connector {
      stroke: #475569;
      stroke-width: 2;
      fill: none;
    }
    .connector-highlight {
      stroke: #38bdf8;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 6 3;
    }
    .arrowhead {
      fill: #475569;
    }
    .arrowhead-highlight {
      fill: #38bdf8;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }
    .footer-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <h1>Open Brain Architecture</h1>
  <p class="subtitle">Your AI memory system — capture, store, retrieve, evolve</p>

  <div class="chart-container">
    <svg viewBox="0 0 1160 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Arrowheads -->
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" class="arrowhead"/>
        </marker>
        <marker id="arrow-highlight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" class="arrowhead-highlight"/>
        </marker>
        <!-- Glow filter -->
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ==================== LAYER 1: CAPTURE ==================== -->
      <rect x="20" y="20" width="260" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="150" y="50" class="layer-num" text-anchor="middle">01</text>
      <text x="150" y="66" class="layer-label" text-anchor="middle">Capture</text>

      <!-- Input sources -->
      <rect x="60" y="95" width="180" height="42" rx="21" fill="#48bb78"/>
      <text x="150" y="113" class="node-text-dark">You type a thought</text>
      <text x="150" y="127" class="node-text-dark-sm">Claude, Slack, any client</text>

      <!-- Arrow down -->
      <line x1="150" y1="137" x2="150" y2="165" class="connector" marker-end="url(#arrow)"/>

      <!-- Edge Function -->
      <rect x="55" y="168" width="190" height="40" rx="6" fill="#6366f1"/>
      <text x="150" y="185" class="node-text" font-size="12">Supabase Edge Function</text>
      <text x="150" y="198" class="node-text-sm" font-size="9" fill="rgba(255,255,255,0.7)">serverless, &lt;10s round trip</text>

      <!-- Parallel split -->
      <line x1="150" y1="208" x2="150" y2="225" class="connector"/>
      <line x1="90" y1="225" x2="210" y2="225" class="connector"/>
      <line x1="90" y1="225" x2="90" y2="240" class="connector" marker-end="url(#arrow)"/>
      <line x1="210" y1="225" x2="210" y2="240" class="connector" marker-end="url(#arrow)"/>

      <!-- Parallel: Embed -->
      <rect x="45" y="243" width="90" height="50" rx="6" fill="#8b5cf6"/>
      <text x="90" y="264" class="node-text" font-size="11">Generate</text>
      <text x="90" y="278" class="node-text" font-size="11">Embedding</text>

      <!-- Parallel: Extract -->
      <rect x="165" y="243" width="90" height="50" rx="6" fill="#8b5cf6"/>
      <text x="210" y="264" class="node-text" font-size="11">Extract</text>
      <text x="210" y="278" class="node-text" font-size="11">Metadata</text>

      <!-- Parallel label -->
      <text x="150" y="220" class="arrow-label" font-size="9" fill="#a78bfa">parallel</text>

      <!-- Merge and confirm -->
      <line x1="90" y1="293" x2="90" y2="310" class="connector"/>
      <line x1="210" y1="293" x2="210" y2="310" class="connector"/>
      <line x1="90" y1="310" x2="210" y2="310" class="connector"/>
      <line x1="150" y1="310" x2="150" y2="325" class="connector" marker-end="url(#arrow)"/>

      <rect x="75" y="328" width="150" height="36" rx="18" fill="#48bb78"/>
      <text x="150" y="349" class="node-text-dark" font-size="12">Confirmed in-thread</text>


      <!-- ==================== ARROW: Capture → Database ==================== -->
      <line x1="280" y1="200" x2="320" y2="200" class="connector" marker-end="url(#arrow)"/>
      <text x="300" y="193" class="arrow-label">store</text>


      <!-- ==================== LAYER 2: DATABASE ==================== -->
      <rect x="325" y="20" width="240" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="445" y="50" class="layer-num" text-anchor="middle">02</text>
      <text x="445" y="66" class="layer-label" text-anchor="middle">Database</text>

      <!-- DB icon / main box -->
      <rect x="365" y="95" width="160" height="50" rx="6" fill="#0ea5e9"/>
      <text x="445" y="116" class="node-text">PostgreSQL</text>
      <text x="445" y="132" class="node-text-sm">Supabase — you own it</text>

      <!-- Three storage blocks -->
      <rect x="365" y="168" width="160" height="34" rx="4" fill="#0369a1"/>
      <text x="445" y="189" class="node-text" font-size="11">Raw Thoughts</text>

      <rect x="365" y="212" width="160" height="34" rx="4" fill="#0369a1"/>
      <text x="445" y="233" class="node-text" font-size="11">Vector Embeddings</text>

      <rect x="365" y="256" width="160" height="34" rx="4" fill="#0369a1"/>
      <text x="445" y="277" class="node-text" font-size="11">Metadata (JSONB)</text>

      <!-- Ownership callout -->
      <rect x="370" y="310" width="150" height="52" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="445" y="331" class="arrow-label" fill="#94a3b8" font-size="10">No SaaS middleman</text>
      <text x="445" y="345" class="arrow-label" fill="#94a3b8" font-size="10">No proprietary format</text>
      <text x="445" y="359" class="arrow-label" fill="#cbd5e1" font-size="10" font-weight="600">Just Postgres</text>


      <!-- ==================== ARROW: Database → Retrieval ==================== -->
      <line x1="565" y1="200" x2="605" y2="200" class="connector" marker-end="url(#arrow)"/>
      <text x="585" y="193" class="arrow-label">query</text>


      <!-- ==================== LAYER 3: RETRIEVAL ==================== -->
      <rect x="610" y="20" width="260" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="740" y="50" class="layer-num" text-anchor="middle">03</text>
      <text x="740" y="66" class="layer-label" text-anchor="middle">Retrieval</text>

      <!-- MCP Server -->
      <rect x="650" y="95" width="180" height="44" rx="6" fill="#f59e0b"/>
      <text x="740" y="113" class="node-text-dark">MCP Server</text>
      <text x="740" y="128" class="node-text-dark-sm">one protocol, any client</text>

      <!-- Three tools -->
      <line x1="740" y1="139" x2="740" y2="160" class="connector"/>
      <line x1="670" y1="160" x2="810" y2="160" class="connector"/>
      <line x1="670" y1="160" x2="670" y2="173" class="connector" marker-end="url(#arrow)"/>
      <line x1="740" y1="160" x2="740" y2="173" class="connector" marker-end="url(#arrow)"/>
      <line x1="810" y1="160" x2="810" y2="173" class="connector" marker-end="url(#arrow)"/>

      <rect x="635" y="176" width="70" height="48" rx="6" fill="#d97706"/>
      <text x="670" y="196" class="node-text-dark" font-size="10">Semantic</text>
      <text x="670" y="210" class="node-text-dark" font-size="10">Search</text>

      <rect x="705" y="176" width="70" height="48" rx="6" fill="#d97706"/>
      <text x="740" y="196" class="node-text-dark" font-size="10">List</text>
      <text x="740" y="210" class="node-text-dark" font-size="10">Recent</text>

      <rect x="775" y="176" width="70" height="48" rx="6" fill="#d97706"/>
      <text x="810" y="196" class="node-text-dark" font-size="10">Stats &amp;</text>
      <text x="810" y="210" class="node-text-dark" font-size="10">Patterns</text>

      <!-- AI Clients -->
      <line x1="740" y1="224" x2="740" y2="240" class="connector"/>
      <line x1="740" y1="240" x2="670" y2="240" class="connector"/>
      <line x1="740" y1="240" x2="810" y2="240" class="connector"/>
      <text x="740" y="255" class="arrow-label" font-size="9" fill="#94a3b8">connects to any AI client</text>

      <rect x="635" y="268" width="70" height="32" rx="16" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="670" y="287" class="node-text" font-size="10">Claude</text>

      <rect x="705" y="268" width="70" height="32" rx="16" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="740" y="287" class="node-text" font-size="10">ChatGPT</text>

      <rect x="775" y="268" width="70" height="32" rx="16" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="810" y="287" class="node-text" font-size="10">Cursor</text>

      <rect x="670" y="310" width="140" height="32" rx="16" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="740" y="329" class="node-text" font-size="10">Any MCP Client</text>


      <!-- ==================== LAYER 4: CONTINUOUS LEARNING ==================== -->
      <rect x="900" y="20" width="240" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="1020" y="50" class="layer-num" text-anchor="middle">04</text>
      <text x="1020" y="66" class="layer-label" text-anchor="middle">Continuous Learning</text>

      <!-- Arrow from retrieval to learning -->
      <line x1="870" y1="200" x2="900" y2="200" class="connector-highlight" marker-end="url(#arrow-highlight)"/>

      <!-- Failure log -->
      <rect x="940" y="95" width="160" height="44" rx="6" fill="#e53e3e"/>
      <text x="1020" y="113" class="node-text">Failure Log</text>
      <text x="1020" y="128" class="node-text-sm">retrieval-miss, stale, repeat</text>

      <line x1="1020" y1="139" x2="1020" y2="165" class="connector-highlight" marker-end="url(#arrow-highlight)"/>

      <!-- Categorize -->
      <rect x="940" y="168" width="160" height="40" rx="6" fill="#dc2626"/>
      <text x="1020" y="184" class="node-text" font-size="12">Categorize + Rate</text>
      <text x="1020" y="198" class="node-text-sm" font-size="9.5">type, severity, frequency</text>

      <line x1="1020" y1="208" x2="1020" y2="234" class="connector-highlight" marker-end="url(#arrow-highlight)"/>

      <!-- Patterns -->
      <rect x="940" y="237" width="160" height="40" rx="6" fill="#b91c1c"/>
      <text x="1020" y="253" class="node-text" font-size="12">Surface Patterns</text>
      <text x="1020" y="267" class="node-text-sm" font-size="9.5">weaknesses become roadmap</text>

      <line x1="1020" y1="277" x2="1020" y2="303" class="connector-highlight" marker-end="url(#arrow-highlight)"/>

      <!-- Build next -->
      <rect x="955" y="306" width="130" height="40" rx="20" fill="#38bdf8"/>
      <text x="1020" y="330" class="node-text-dark" font-size="12">Drive Next Build</text>

      <!-- Feedback loop arrow back to database -->
      <path d="M1020,346 L1020,400 L445,400 L445,370" class="connector-highlight" marker-end="url(#arrow-highlight)" stroke-dasharray="6 3"/>
      <text x="730" y="415" class="arrow-label" fill="#38bdf8" font-size="10">system evolves from its own failures</text>


      <!-- ==================== TIMING CALLOUT ==================== -->
      <rect x="20" y="440" width="1120" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="580" y="465" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">The whole system runs on open standards you already know</text>
      <text x="580" y="485" text-anchor="middle" font-size="11" fill="#94a3b8">Postgres + pgvector + MCP + Edge Functions  |  No vendor lock-in  |  Full data ownership  |  &lt;10s capture round trip</text>

    </svg>
  </div>

  <!-- Legend -->
  <div class="footer">
    <div class="footer-item">
      <div class="footer-dot" style="background: #48bb78;"></div>
      Input / Confirmation
    </div>
    <div class="footer-item">
      <div class="footer-dot" style="background: #6366f1;"></div>
      Processing
    </div>
    <div class="footer-item">
      <div class="footer-dot" style="background: #0ea5e9;"></div>
      Storage
    </div>
    <div class="footer-item">
      <div class="footer-dot" style="background: #f59e0b;"></div>
      Retrieval
    </div>
    <div class="footer-item">
      <div class="footer-dot" style="background: #e53e3e;"></div>
      Learning Loop
    </div>
    <div class="footer-item">
      <div class="footer-dot" style="background: #38bdf8;"></div>
      Feedback Cycle
    </div>
  </div>

</body>
</html>
